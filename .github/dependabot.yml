version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "main"
    cooldown:
      default-days: 10
    assignees:
      - "hibare"

  # Maintain dependencies for Go mods
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "main"
    cooldown:
      default-days: 10
    assignees:
      - "hibare"
